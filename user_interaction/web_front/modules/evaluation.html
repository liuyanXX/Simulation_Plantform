<!DOCTYPE html>

<html lang="zh-CN">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仿真平台 - 评估管理</title>
    <link rel="stylesheet" href="../css/app.css">

</head>

<body>

    <div id="app">

        <div class="bg-animation"></div>

        <main class="main-container">

            <!-- 评估管理 -->
            <section key="evaluation">
                <h1 class="page-title">评估管理</h1>
                <p class="page-desc">仿真结果评估与指标分析</p>
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-icon" style="background:rgba(168,85,247,0.15);color:#c084fc;">📈</div>
                            评估指标
                        </div>
                    </div>
                    <div class="empty-state">
                        <div style="font-size:48px;">📈</div>
                        <p>评估功能待完善，请先运行仿真后在此分析结果</p>
                    </div>
                </div>

                <!-- 指标评估管理子模块入口 -->
                <div class="card" style="margin-top:16px;cursor:pointer;border:1px solid rgba(168,85,247,0.4);background:linear-gradient(135deg,rgba(168,85,247,0.12),rgba(79,70,229,0.12));"
                     @click="openIndicatorEvaluation">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-icon" style="background:rgba(168,85,247,0.2);color:#c084fc;">🎯</div>
                            指标评估管理
                            <span style="font-size:12px;color:#22d3ee;margin-left:8px;">进入 ↗</span>
                        </div>
                    </div>
                    <p style="color:var(--text-secondary);font-size:14px;padding:0 4px 4px;">
                        评估对象、计分规则、评估模板、评估任务填报与计分、结果快照对比的一体化管理（开箱即用）
                    </p>
                </div>
            </section>

            <!-- 消息提示 -->
            <div class="toast-container">
                <div
                    v-for="toast in toasts"
                    :key="toast.id"
                    class="toast"
                    :class="'toast-' + toast.type"
                >
                    <div class="toast-icon">
                        {{ toast.type === 'success' ? '✓' : toast.type === 'warning' ? '!' : toast.type === 'error' ? '✕' : 'ℹ' }}
                    </div>
                    <div>
                        <div style="font-weight: 600; margin-bottom: 2px;">{{ toast.title }}</div>
                        <div style="font-size: 13px; color: var(--text-secondary);">{{ toast.message }}</div>
                    </div>
                </div>
            </div>

        </main>

    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="../js/simulation_plant_common.js"></script>
<script src="../js/evaluation.js"></script>

</body>

</html>
