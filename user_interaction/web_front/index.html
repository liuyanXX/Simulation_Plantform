<!DOCTYPE html>

<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>仿真平台 - 用户交互界面</title>

    <link rel="stylesheet" href="./css/app.css">

</head>

<body>

    <div id="app">

        <div class="bg-animation"></div>



        <!-- 导航栏 -->

        <nav class="navbar">

            <div class="navbar-inner">

                <div class="logo">

                    <div class="logo-icon">◈</div>

                    仿真平台

                </div>

                <div class="nav-menu">

                    <button
                        v-for="item in navItems"
                        :key="item.key"
                        class="nav-item"
                        :class="{ active: currentView === item.key }"
                        @click="switchView(item.key)"
                    >
                        {{ item.label }}
                    </button>

                </div>

            </div>

        </nav>



        <!-- 主内容：模块 iframe -->

        <main class="main-container">

            <div class="module-shell">

                <iframe
                    ref="iframeEl"
                    :src="currentSrc"
                    class="module-iframe"
                    frameborder="0"
                    allow="fullscreen"
                    @load="onIframeLoad"
                ></iframe>

            </div>

        </main>

    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>

        const { createApp, ref, computed, onMounted, onBeforeUnmount } = Vue;

        createApp({

            setup() {

                const navItems = [
                    { key: 'solution',      label: '方案管理'  },
                    { key: 'understanding', label: '方案理解'  },
                    { key: 'decomposition',  label: '方案拆分'  },
                    { key: 'display',       label: '信息展示'  },
                    { key: 'simulation',    label: '仿真管理'  },
                    { key: 'evaluation',    label: '评估管理'  },
                    { key: 'knowledge',     label: '知识管理'  },
                    { key: 'system',        label: '系统管理'  }
                ];

                const VALID_KEYS = navItems.map(i => i.key);
                const DEFAULT_KEY = 'solution';

                function parseHashKey() {
                    const raw = (location.hash || '').replace(/^#/, '').trim();
                    if (!raw) return DEFAULT_KEY;
                    const key = raw.split('/')[0].split('?')[0];
                    if (VALID_KEYS.indexOf(key) !== -1) return key;
                    return DEFAULT_KEY;
                }

                const currentView = ref(parseHashKey());

                const currentSrc = computed(() => {
                    const k = currentView.value || DEFAULT_KEY;
                    return `./modules/${k}.html`;
                });

                const iframeEl = ref(null);

                function switchView(key) {
                    if (!key || VALID_KEYS.indexOf(key) === -1) key = DEFAULT_KEY;
                    currentView.value = key;
                    const h = (location.hash || '').replace(/^#/, '');
                    if (h !== key) {
                        history.replaceState(null, '', '#' + key);
                    }
                }

                function applyHash() {
                    const key = parseHashKey();
                    if (key !== currentView.value) {
                        currentView.value = key;
                    }
                }

                function onHashChange() {
                    applyHash();
                }

                function onMessage(evt) {
                    try {
                        if (!evt || !evt.data) return;
                        if (typeof evt.data !== 'object') return;
                        const t = evt.data.type;
                        if (!t) return;
                        if (t === 'sim-navigate' || t === 'navigate') {
                            const key = evt.data.key;
                            if (key && VALID_KEYS.indexOf(key) !== -1) {
                                switchView(key);
                            }
                        }
                    } catch (e) {}
                }

                function onIframeLoad() {
                    const k = currentView.value || DEFAULT_KEY;
                    try {
                        const win = iframeEl.value && iframeEl.value.contentWindow;
                        if (win && win.postMessage) {
                            win.postMessage({ type: 'sim-parent-active', key: k }, '*');
                        }
                    } catch (e) {}
                }

                onMounted(() => {
                    applyHash();
                    window.addEventListener('hashchange', onHashChange);
                    window.addEventListener('message', onMessage);
                });

                onBeforeUnmount(() => {
                    window.removeEventListener('hashchange', onHashChange);
                    window.removeEventListener('message', onMessage);
                });

                return {
                    navItems,
                    currentView,
                    currentSrc,
                    iframeEl,
                    switchView,
                    onIframeLoad
                };
            }

        }).mount('#app');

    </script>

</body>

</html>
